spring.application.name=backend
server.port=8081

# MongoDB: set MONGODB_URI for Atlas, or use application-local.properties (gitignored). Imported file overrides this default.
spring.config.import=optional:classpath:application-local.properties
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/smart_campus}

# JWT (use a strong secret in production; min 32 bytes for HS256)
jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Seeded SUPERADMIN (only created if no user with this identifier exists).
# Requested default credentials: admin / admin1234
app.superadmin.email=${APP_SUPERADMIN_EMAIL:admin}
app.superadmin.password=${APP_SUPERADMIN_PASSWORD:admin1234}
app.superadmin.full-name=${APP_SUPERADMIN_FULL_NAME:System Superadmin}

# Demo users (created on startup if missing; login UI may use short names — mapped to @smartcampus.local):
# student1 / Student@123 (STUDENT), admin / Admin@123 (ADMIN), tech1 / Tech@123 (TECHNICIAN)
