spring.application.name=backend
server.port=8081

# MongoDB: for this Spring Boot version, use spring.mongodb.uri.
# Keep spring.data.mongodb.uri in sync as compatibility fallback.
spring.config.import=optional:classpath:application-local.properties
spring.mongodb.uri=mongodb+srv://janithcamitha_db_user:YIc2H4I5KpIXWHEp@cluster0.ptmjjxa.mongodb.net/smartcampus?retryWrites=true&w=majority
spring.data.mongodb.uri=${spring.mongodb.uri}

# JWT (use a strong secret in production; min 32 bytes for HS256)
jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Seeded SUPERADMIN (only created if no user with this identifier exists).
# Requested default credentials: admin / admin1234
app.superadmin.email=${APP_SUPERADMIN_EMAIL:admin}
app.superadmin.password=${APP_SUPERADMIN_PASSWORD:admin1234}
app.superadmin.full-name=${APP_SUPERADMIN_FULL_NAME:System Superadmin}

# Demo users (created on startup if missing; login UI may use short names — mapped to @smartcampus.local):
# student1 / Student@123 (STUDENT), admin / Admin@123 (ADMIN), tech1 / Tech@123 (TECHNICIAN)

# Base URLs (support ngrok/public tunnel values via env vars)
app.base.url=${APP_BASE_URL:http://localhost:8081}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Google Sign-In (student OAuth): Web client ID from Google Cloud Console
app.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
# Comma-separated allowed domains for Google student sign-in. Default: my.sliit.lk. If blank, backend still enforces @my.sliit.lk.
app.google.oauth.allowed-email-domains=${GOOGLE_OAUTH_ALLOWED_EMAIL_DOMAINS:my.sliit.lk}

# --- Email verification (Gmail SMTP) ---
# Use an App Password if 2FA is on: https://support.google.com/accounts/answer/185833
# Set spring.mail.password via env SPRING_MAIL_PASSWORD or application-local.properties (gitignored).
app.email.enabled=${APP_EMAIL_ENABLED:true}
app.email.from=${APP_EMAIL_FROM:${spring.mail.username:}}
app.email.verification.otp-valid-minutes=${APP_VERIFICATION_OTP_MINUTES:5}
app.email.password-reset.otp-valid-minutes=${APP_PASSWORD_RESET_OTP_MINUTES:5}
app.email.sender-name=${APP_EMAIL_SENDER_NAME:Smart Campus Hub}
app.email.log-verification-otp=${APP_EMAIL_LOG_VERIFICATION_OTP:false}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000

# File Storage
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true